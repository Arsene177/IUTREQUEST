services:
  - type: web
    name: iut-request-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: iut-request-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: iut-request-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: iut-request-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: iut-request-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: iut-request-db
          property: database
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: iut-request-db
    databaseName: janngo_db
    user: janngo
    plan: free
